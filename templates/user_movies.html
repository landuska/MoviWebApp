{% extends "base.html" %}

{% block content %}
    <h1>Favorite Movies of {{ user.name }}</h1>

    <div>
        <p><a href="{{ url_for('index') }}" class="btn">← Back to Users</a></p>

        <ul class="user-list">
            {% for movie in movies %}
            <li class="user-entry">
                <strong>{{ movie.title }}</strong>

                <form method="POST" action="{{ url_for('update_movie', user_id=user.id, movie_id=movie.id) }}" style="display: inline;">
                    <input type="text" name="title" placeholder="New title" required>
                    <input type="submit" value="Update" class="btn">
                </form>

                <form method="POST" action="{{ url_for('delete_movie', user_id=user.id, movie_id=movie.id) }}" style="display: inline;">
                    <input type="submit" value="Delete" class="btn">
                </form>
            </li>
            {% else %}
            <li>This user has no movies yet.</li>
            {% endfor %}
        </ul>

        <hr>

        <h3>Add Movie</h3>
        <form method="POST" action="{{ url_for('add_movie', user_id=user.id) }}">
            <input type="text" name="title" placeholder="Movie title" required>
            <input type="submit" value="Add" class="btn">
        </form>
    </div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
    <h1>Users</h1>
    <div>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="flash-message">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <ul class="user-list">
            {% for user in users %}
            <li class="user-entry">
                <a href="{{ url_for('get_movies', user_id=user.id) }}" class="btn">{{ user.name }}</a>
            </li>
            {% endfor %}
        </ul>

        <form method="POST" action="{{ url_for('add_user') }}" >
            <input type="text" name="username">
            <input type="submit" value="Add">
        </form>
    </div>
{% endblock %}
